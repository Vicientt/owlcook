name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: owlcook
          MYSQL_USER: owlcook_user
          MYSQL_PASSWORD: owlcook_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u owlcook_user -powlcook_pass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Apply database schema
        run: mysql -h 127.0.0.1 -u owlcook_user -powlcook_pass owlcook < docs/schema.sql

      - name: Run backend tests
        run: npm run test:backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_USER: owlcook_user
          DB_PASSWORD: owlcook_pass
          DB_NAME: owlcook
          TEST_DB_NAME: owlcook
          SECRET: ${{ secrets.SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build frontend and deploy to backend
        run: npm run deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: production
          DB_HOST: 127.0.0.1
          DB_USER: owlcook_user
          DB_PASSWORD: owlcook_pass
          DB_NAME: owlcook
          TEST_DB_NAME: owlcook
          SECRET: ${{ secrets.SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PORT: 4139
